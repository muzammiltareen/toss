<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Digital Toss System</title>
	<link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
	<div class="mainContainer mainContainerHome">
		<div class="header">
			<div class="logo">
				<div class="name">
					<p>Kawsar Technology</p>
				</div>
				<div>
					<img src="menu.png" class="btnMenu">
				</div>
			</div>
			<div class="links">
				<a href="index.html">Home</a>
				<a href="about.html">About</a>
				<a href="contact.html">Contact</a>
			</div>
		</div>
		<div class="body">
			<div class="innerBody">
				<p>Kawsar Digital Toss</p>
				<div class="tossCoin">
					<img src="toss.png" class="image">
				</div>
					<input type="text" name="flipper" placeholder="Flipper Name">
					<input type="text" name="caller" placeholder="Caller Name">
				<div class="radio">
					<div class="head">
						<input type="radio" id="head" name="toss" value="head">
  						<label for="head">Head</label><br>
					</div>
					<div class="tails">
						<input type="radio" id="tails" name="toss" value="tails">
  						<label for="tails">Tails</label><br>
					</div>
				</div>
				<button class="btnToss" onclick="tossFlipping()">Flip Coin</button>
			</div>
		</div>
		<div class="footer">
			<p>Kawsar Technology</p>
		</div>
	</div>
	<script src="script.js"></script>
</body>
</html>
